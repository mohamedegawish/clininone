<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClinicOne – Admin Sidebar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter+Tight:wght@700;800;900&display=swap" rel="stylesheet" />

  <style>
    /* ─────────────────────────────────────────
       CSS Variables (from styles.css)
    ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary-dark:   #1f4e79;
      --primary:        #2f6f9f;
      --primary-light:  #3fa7d6;
      --secondary:      #2bb8a6;
      --accent:         #3ec7a3;
      --white:          #ffffff;
      --gray:           #a4c5df;
      --bg:             #2f6f9f;

      --border:         rgba(255, 255, 255, 0.15);
      --border-light:   rgba(255, 255, 255, 0.08);
      --shadow:         0 8px 32px rgba(8, 28, 48, 0.2);
      --radius:         12px;
      --radius-sm:      8px;
      --radius-lg:      16px;

      --bg-dark:        var(--bg);
      --bg-card:        #ffffff;
      --bg-surface:     rgba(255, 255, 255, 0.05);
      --bg-elevated:    rgba(255, 255, 255, 0.1);

      --text-primary:   #ffffff;
      --text-secondary: #e0f2fe;
      --text-muted:     var(--gray);

      --warning: #f59e0b;
      --danger:  #ef4444;
    }

    html, body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      font-size: 15px;
      line-height: 1.6;
    }

    /* ─────────────────────────────────────────
       Demo page layout (sidebar + content area)
    ───────────────────────────────────────── */
    .page-wrapper {
      display: flex;
      min-height: 100vh;
    }

    /* ─────────────────────────────────────────
       Sidebar
    ───────────────────────────────────────── */
    .sidebar {
      width: 240px;
      background: var(--primary-dark);
      border-right: 1px solid var(--border-light);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    /* ── Header ── */
    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }

    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      cursor: pointer;
    }
    .navbar-logo {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .navbar-logo svg { width: 22px; height: 22px; }
    .navbar-title {
      font-size: 16px;
      font-weight: 800;
      color: var(--text-primary);
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .navbar-subtitle {
      font-size: 10px;
      color: var(--primary-light);
      font-weight: 600;
      letter-spacing: 0.08em;
      margin-top: 2px;
    }

    /* ── Section ── */
    .sidebar-section {
      padding: 16px 10px;
      flex: 1;
    }
    .sidebar-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 6px 10px;
      margin-bottom: 2px;
    }

    /* ── Items ── */
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      margin-bottom: 1px;
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
    }
    .sidebar-item:hover {
      background: rgba(63, 167, 214, 0.07);
      color: var(--text-primary);
    }
    .sidebar-item.active {
      background: rgba(63, 167, 214, 0.14);
      color: var(--primary-light);
    }
    .sidebar-item .icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      opacity: 0.65;
      transition: opacity 0.15s;
    }
    .sidebar-item.active .icon  { opacity: 1; }
    .sidebar-item:hover  .icon  { opacity: 1; }

    /* ── Footer ── */
    .sidebar-footer {
      padding: 14px;
      border-top: 1px solid var(--border);
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.18s;
      text-decoration: none;
      white-space: nowrap;
      letter-spacing: 0.01em;
      font-family: 'Cairo', sans-serif;
    }
    .btn-ghost {
      background: rgba(63, 167, 214, 0.05);
      color: var(--text-secondary);
      border: 1px solid var(--border-light);
    }
    .btn-ghost:hover {
      background: rgba(31, 78, 121, 0.1);
      color: var(--text-primary);
    }
    .btn-sm {
      padding: 7px 14px;
      font-size: 12px;
      border-radius: 7px;
      gap: 6px;
    }

    /* ─────────────────────────────────────────
       Demo content area (right side placeholder)
    ───────────────────────────────────────── */
    .demo-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      font-size: 14px;
      opacity: 0.6;
      user-select: none;
    }
    .demo-content svg { opacity: 0.4; }
    .demo-content p { letter-spacing: 0.02em; }

    /* ─────────────────────────────────────────
       Mobile Navbar (shown below 768 px)
    ───────────────────────────────────────── */
    .admin-navbar {
      display: none;
      position: sticky;
      top: 0;
      z-index: 100;
      height: 56px;
      align-items: center;
      justify-content: space-between;
      background: rgba(47, 111, 159, 0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding: 0 16px;
      gap: 10px;
    }

    .hamburger-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: var(--primary-light);
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .hamburger-btn:hover {
      background: rgba(255, 255, 255, 0.18);
      color: var(--white);
    }

    /* ─────────────────────────────────────────
       Mobile Overlay + Drawer
    ───────────────────────────────────────── */
    .mobile-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(8, 28, 48, 0.65);
      backdrop-filter: blur(6px);
      animation: fadeIn 0.2s ease;
    }
    .mobile-overlay.open { display: block; }

    .mobile-drawer {
      position: fixed;
      top: 0;
      right: -100%;
      bottom: 0;
      z-index: 201;
      width: min(82vw, 300px);
      background: linear-gradient(180deg, #1a3f68 0%, #0f2744 100%);
      border-left: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      transition: right 0.28s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .mobile-drawer.open { right: 0; }

    .drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    .drawer-nav    { padding: 12px 8px; flex: 1; }
    .drawer-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 14px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      transition: all 0.15s;
      margin-bottom: 4px;
      border: 1px solid transparent;
      cursor: pointer;
      background: transparent;
      width: 100%;
      text-align: left;
      font-family: 'Cairo', sans-serif;
    }
    .drawer-link svg { flex-shrink: 0; }
    .drawer-link:hover { background: rgba(255, 255, 255, 0.08); color: var(--white); }
    .drawer-link.active {
      background: rgba(255, 255, 255, 0.12);
      color: var(--white);
      border-color: rgba(255, 255, 255, 0.15);
    }
    .drawer-controls { padding: 12px 14px; border-top: 1px solid rgba(255, 255, 255, 0.08); }
    .drawer-install  { padding: 12px 14px; border-top: 1px solid rgba(255, 255, 255, 0.08); }

    /* ── Drawer Buttons ── */
    .btn-primary {
      background: var(--primary);
      color: #fff !important;
      border: none;
    }
    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(31, 78, 121, 0.25);
    }

    /* ─────────────────────────────────────────
       Animations
    ───────────────────────────────────────── */
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes slideInDrawer {
      from { transform: translateX(100%); }
      to   { transform: translateX(0); }
    }

    /* ─────────────────────────────────────────
       Responsive
    ───────────────────────────────────────── */
    @media (max-width: 768px) {
      .sidebar       { display: none; }
      .admin-navbar  { display: flex; }
    }

    /* ─────────────────────────────────────────
       Scrollbar
    ───────────────────────────────────────── */
    ::-webkit-scrollbar         { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track   { background: transparent; }
    ::-webkit-scrollbar-thumb   { background: rgba(63, 167, 214, 0.15); border-radius: 4px; }
  </style>
</head>
<body>

  <!-- ══════════════════════════════════
       Mobile Navbar (shown on mobile)
  ══════════════════════════════════ -->
  <nav class="admin-navbar">
    <div class="navbar-brand">
      <div class="navbar-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
        </svg>
      </div>
      <div>
        <div class="navbar-title">ClinicOne</div>
        <div class="navbar-subtitle">ADMIN</div>
      </div>
    </div>

    <button class="hamburger-btn" id="menuBtn" aria-label="Toggle menu" onclick="openDrawer()">
      <!-- Hamburger icon -->
      <svg id="iconHamburger" width="22" height="22" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5">
        <line x1="3" y1="6" x2="21" y2="6" />
        <line x1="3" y1="12" x2="21" y2="12" />
        <line x1="3" y1="18" x2="21" y2="18" />
      </svg>
      <!-- Close icon (hidden by default) -->
      <svg id="iconClose" style="display:none" width="22" height="22" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>
  </nav>

  <!-- ══════════════════════════════════
       Mobile Overlay
  ══════════════════════════════════ -->
  <div class="mobile-overlay" id="overlay" onclick="closeDrawer()"></div>

  <!-- ══════════════════════════════════
       Mobile Drawer
  ══════════════════════════════════ -->
  <div class="mobile-drawer" id="drawer">
    <div class="drawer-header">
      <div class="navbar-brand">
        <div class="navbar-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
          </svg>
        </div>
        <div>
          <div class="navbar-title">ClinicOne</div>
          <div class="navbar-subtitle">ADMIN</div>
        </div>
      </div>
      <button class="hamburger-btn" aria-label="Close menu" onclick="closeDrawer()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>

    <div class="drawer-nav">
      <a class="drawer-link active" href="#" onclick="closeDrawer()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" /><rect x="14" y="3" width="7" height="7" />
          <rect x="14" y="14" width="7" height="7" /><rect x="3" y="14" width="7" height="7" />
        </svg>
        Dashboard
      </a>
      <a class="drawer-link" href="#" onclick="closeDrawer()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" />
        </svg>
        Add Doctor
      </a>
      <a class="drawer-link" href="#" onclick="closeDrawer()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
        Manage Doctors
      </a>
      <a class="drawer-link" href="#" onclick="closeDrawer()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="20" x2="18" y2="10" />
          <line x1="12" y1="20" x2="12" y2="4" />
          <line x1="6"  y1="20" x2="6"  y2="14" />
        </svg>
        Reports
      </a>
    </div>

    <div class="drawer-controls">
      <a class="drawer-link" href="#" onclick="closeDrawer()"
         style="border-top: 1px solid rgba(255,255,255,0.1); margin-top:8px; padding-top:12px">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        Patient Portal
      </a>
      <a class="drawer-link" href="#" onclick="closeDrawer()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
        Doctor Portal
      </a>
    </div>

    <div class="drawer-install">
      <button class="btn btn-primary btn-sm" style="width:100%; justify-content:center; gap:8px; margin-bottom:10px">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="7 10 12 15 17 10" />
          <line x1="12" y1="15" x2="12" y2="3" />
        </svg>
        Download App
      </button>
      <button class="btn btn-ghost btn-sm" onclick="closeDrawer()"
              style="width:100%; justify-content:center; gap:8px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        Sign Out
      </button>
    </div>
  </div>

  <!-- ══════════════════════════════════
       Main Layout (Sidebar + Content)
  ══════════════════════════════════ -->
  <div class="page-wrapper">

    <!-- ── Desktop Sidebar ── -->
    <aside class="sidebar">

      <!-- Header / Logo -->
      <div class="sidebar-header">
        <div class="navbar-brand">
          <div class="navbar-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
              <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
            </svg>
          </div>
          <div>
            <div class="navbar-title">ClinicOne</div>
            <div class="navbar-subtitle">ADMIN</div>
          </div>
        </div>
      </div>

      <!-- Navigation -->
      <div class="sidebar-section">

        <div class="sidebar-label">Management</div>

        <a class="sidebar-item active" href="#" id="nav-dashboard">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round">
            <rect x="3" y="3" width="7" height="7" />
            <rect x="14" y="3" width="7" height="7" />
            <rect x="14" y="14" width="7" height="7" />
            <rect x="3" y="14" width="7" height="7" />
          </svg>
          Dashboard
        </a>

        <a class="sidebar-item" href="#" id="nav-add-doctor">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5"  y1="12" x2="19" y2="12" />
          </svg>
          Add Doctor
        </a>

        <a class="sidebar-item" href="#" id="nav-manage-doctors">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
          Manage Doctors
        </a>

        <a class="sidebar-item" href="#" id="nav-reports">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round">
            <line x1="18" y1="20" x2="18" y2="10" />
            <line x1="12" y1="20" x2="12" y2="4" />
            <line x1="6"  y1="20" x2="6"  y2="14" />
          </svg>
          Reports
        </a>

        <div class="sidebar-label" style="margin-top:16px">Quick Links</div>

        <a class="sidebar-item" href="#" id="nav-patient">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round">
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
          Patient Portal
        </a>

        <a class="sidebar-item" href="#" id="nav-doctor">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          Doctor Portal
        </a>
      </div>

      <!-- Footer / Sign Out -->
      <div class="sidebar-footer">
        <button class="btn btn-ghost btn-sm" style="width:100%; gap:8px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
          Sign Out
        </button>
      </div>

    </aside>

    <!-- ── Placeholder content area ── -->
    <main class="demo-content">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <rect x="3" y="3" width="7" height="7" />
        <rect x="14" y="3" width="7" height="7" />
        <rect x="14" y="14" width="7" height="7" />
        <rect x="3" y="14" width="7" height="7" />
      </svg>
      <p>Main content area</p>
    </main>

  </div><!-- end .page-wrapper -->

  <!-- ══════════════════════════════════
       Sidebar active-state JS
  ══════════════════════════════════ -->
  <script>
    /* ── Active nav item ── */
    const navItems = document.querySelectorAll('.sidebar-item');
    navItems.forEach(item => {
      item.addEventListener('click', (e) => {
        e.preventDefault();
        navItems.forEach(i => i.classList.remove('active'));
        item.classList.add('active');
      });
    });

    /* ── Mobile drawer ── */
    function openDrawer() {
      document.getElementById('overlay').classList.add('open');
      document.getElementById('drawer').classList.add('open');
      document.getElementById('iconHamburger').style.display = 'none';
      document.getElementById('iconClose').style.display    = 'block';
    }

    function closeDrawer() {
      document.getElementById('overlay').classList.remove('open');
      document.getElementById('drawer').classList.remove('open');
      document.getElementById('iconHamburger').style.display = 'block';
      document.getElementById('iconClose').style.display    = 'none';
    }
  </script>

</body>
</html>
