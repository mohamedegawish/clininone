openapi: 3.0.3
info:
  title: ClinicOne API
  description: Full API documentation for ClinicOne clinic management system
  version: 1.0.0

servers:
  - url: http://127.0.0.1:8000/api
    description: Local server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string }
        role: { type: string }

    Doctor:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string }
        phone: { type: string }
        specialty: { type: string }
        status: { type: string }
        gender: { type: string }
        governorate: { type: string }
        city: { type: string }
        experience_years: { type: integer }
        qualification: { type: string }
        bio: { type: string }

    Clinic:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        address: { type: string }

    Patient:
      type: object
      properties:
        id: { type: integer }
        full_name: { type: string }
        english_name: { type: string }
        phone: { type: string }
        ssn: { type: string }
        birth_date: { type: string, format: date }
        age: { type: integer }
        gender: { type: string }
        nationality: { type: string }
        address: { type: string }
        email: { type: string }
        status: { type: string }

    DoctorSchedule:
      type: object
      properties:
        id: { type: integer }
        doctor_id: { type: integer }
        clinic_id: { type: integer }
        day_of_week: { type: integer }
        day_name: { type: string }
        start_time: { type: string }
        end_time: { type: string }
        slot_duration: { type: integer }
        is_active: { type: boolean }

    Appointment:
      type: object
      properties:
        id: { type: integer }
        appointment_date: { type: string, format: date }
        start_time: { type: string }
        end_time: { type: string }
        queue_number: { type: integer }
        status: { type: string, enum: [pending, confirmed, completed, cancelled] }
        notes: { type: string }
        cancellation_reason: { type: string }
        patient: { $ref: '#/components/schemas/Patient' }
        doctor: { $ref: '#/components/schemas/Doctor' }
        clinic: { $ref: '#/components/schemas/Clinic' }

paths:
  # ================= Auth =================
  /register:
    post:
      summary: Register user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, role]
              properties:
                name: { type: string }
                email: { type: string }
                password: { type: string }
                role: { type: string, enum: [admin, doctor] }
      responses:
        200:
          description: User registered

  /login:
    post:
      summary: Login user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        200:
          description: Login success

  /user:
    get:
      summary: Get current authenticated user
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        200:
          description: User data

  /forgot-password:
    post:
      summary: Send OTP
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string }
      responses:
        200:
          description: OTP sent

  /reset-password:
    post:
      summary: Reset password via OTP
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otp, password]
              properties:
                email: { type: string }
                otp: { type: string }
                password: { type: string }
      responses:
        200:
          description: Password reset successfully

  /refresh-token:
    post:
      summary: Refresh authentication token
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string }
      responses:
        200:
          description: Token refreshed

  /logout:
    post:
      summary: Logout user
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Logged out successfully

  # ================= Admin - Doctors =================
  /admin/doctors:
    get:
      summary: List doctors
      tags: [Admin - Doctors]
      security:
        - bearerAuth: []
      responses:
        200:
          description: List of doctors

    post:
      summary: Create doctor
      tags: [Admin - Doctors]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                email: { type: string }
                password: { type: string }
                phone: { type: string }
                specialty: { type: string }
                status: { type: string, enum: [active, inactive] }
                gender: { type: string, enum: [male, female] }
                governorate: { type: string }
                city: { type: string }
                experience_years: { type: integer }
                qualification: { type: string }
                bio: { type: string }
      responses:
        201:
          description: Doctor created

  /admin/doctors/{id}:
    get:
      summary: Show doctor
      tags: [Admin - Doctors]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        200:
          description: Doctor details

    put:
      summary: Update doctor
      tags: [Admin - Doctors]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                phone: { type: string }
                specialty: { type: string }
      responses:
        200:
          description: Updated

    delete:
      summary: Delete doctor
      tags: [Admin - Doctors]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        200:
          description: Deleted

  # ================= Admin - Clinics =================
  /admin/clinics:
    get:
      summary: List clinics
      tags: [Admin - Clinics]
      security:
        - bearerAuth: []
      responses:
        200:
          description: List clinics

    post:
      summary: Create clinic
      tags: [Admin - Clinics]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                address: { type: string }
      responses:
        201:
          description: Created

  /admin/clinics/{id}:
    get:
      summary: Show clinic
      tags: [Admin - Clinics]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        200:
          description: Clinic details

    put:
      summary: Update clinic
      tags: [Admin - Clinics]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema: { type: integer }
          required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                address: { type: string }
      responses:
        200:
          description: Updated

    delete:
      summary: Delete clinic
      tags: [Admin - Clinics]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema: { type: integer }
          required: true
      responses:
        200:
          description: Deleted

  /admin/stats:
    get:
      summary: Get admin KPIs
      tags: [Admin - Stats]
      security:
        - bearerAuth: []
      responses:
        200:
          description: System statistics

  # ================= Clinic - Patients =================
  /clinic/patients:
    get:
      summary: List patients
      tags: [Clinic - Patients]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: clinic_id
          schema: { type: integer }
        - in: query
          name: search
          schema: { type: string }
      responses:
        200:
          description: Patients list

    post:
      summary: Create patient
      tags: [Clinic - Patients]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clinic_id: { type: integer }
                full_name: { type: string }
                english_name: { type: string }
                phone: { type: string }
                ssn: { type: string }
                birth_date: { type: string, format: date }
                gender: { type: string, enum: [male, female] }
                nationality: { type: string }
                address: { type: string }
      responses:
        201:
          description: Created

  /clinic/patients/{id}:
    get:
      summary: Show patient
      tags: [Clinic - Patients]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: query
          name: clinic_id
          schema: { type: integer }
      responses:
        200:
          description: Details

    put:
      summary: Update patient
      tags: [Clinic - Patients]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                clinic_id: { type: integer }
                full_name: { type: string }
                phone: { type: string }
      responses:
        200:
          description: Updated

    delete:
      summary: Delete patient
      tags: [Clinic - Patients]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: query
          name: clinic_id
          schema: { type: integer }
      responses:
        200:
          description: Deleted

  # ================= Clinic - Schedules =================
  /clinic/schedules:
    get:
      summary: List doctor schedules
      tags: [Clinic - Schedules]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: doctor_id
          required: true
          schema: { type: integer }
        - in: query
          name: clinic_id
          schema: { type: integer }
      responses:
        200:
          description: List of schedules

    post:
      summary: Create / Update schedule (single day)
      tags: [Clinic - Schedules]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                doctor_id: { type: integer }
                clinic_id: { type: integer }
                day_of_week: { type: integer, description: "0=Sunday, 1=Monday..." }
                start_time: { type: string }
                end_time: { type: string }
                slot_duration: { type: integer }
                is_active: { type: boolean }
      responses:
        201:
          description: Saved

  /clinic/schedules/bulk:
    post:
      summary: Bulk set schedules
      tags: [Clinic - Schedules]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                doctor_id: { type: integer }
                clinic_id: { type: integer }
                schedules:
                  type: array
                  items:
                    type: object
                    properties:
                      day_of_week: { type: integer }
                      start_time: { type: string }
                      end_time: { type: string }
                      slot_duration: { type: integer }
                      is_active: { type: boolean }
      responses:
        200:
          description: Saved bulk schedules

  /clinic/schedules/{id}:
    delete:
      summary: Delete a schedule entry
      tags: [Clinic - Schedules]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        200:
          description: Deleted

  # ================= Clinic - Appointments =================
  /clinic/appointments/available-slots:
    get:
      summary: Get available slots
      tags: [Clinic - Appointments]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: doctor_id
          required: true
          schema: { type: integer }
        - in: query
          name: date
          required: true
          schema: { type: string, format: date }
        - in: query
          name: clinic_id
          schema: { type: integer }
      responses:
        200:
          description: Available slots

  /clinic/appointments:
    get:
      summary: List appointments
      tags: [Clinic - Appointments]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: clinic_id
          schema: { type: integer }
        - in: query
          name: doctor_id
          schema: { type: integer }
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: date
          schema: { type: string, format: date }
      responses:
        200:
          description: List of appointments

    post:
      summary: Book appointment
      tags: [Clinic - Appointments]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                doctor_id: { type: integer }
                patient_id: { type: integer }
                clinic_id: { type: integer }
                appointment_date: { type: string, format: date }
                start_time: { type: string }
                notes: { type: string }
      responses:
        201:
          description: Appointment booked

  /clinic/appointments/{id}:
    get:
      summary: Show appointment
      tags: [Clinic - Appointments]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: query
          name: clinic_id
          schema: { type: integer }
      responses:
        200:
          description: Details

  /clinic/appointments/{id}/confirm:
    patch:
      summary: Confirm appointment
      tags: [Clinic - Appointments]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        200:
          description: Confirmed

  /clinic/appointments/{id}/complete:
    patch:
      summary: Complete appointment
      tags: [Clinic - Appointments]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        200:
          description: Completed

  /clinic/appointments/{id}/cancel:
    patch:
      summary: Cancel appointment
      tags: [Clinic - Appointments]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                clinic_id: { type: integer }
                cancellation_reason: { type: string }
      responses:
        200:
          description: Cancelled

  /clinic/queue/{doctorId}:
    get:
      summary: Get current active queue state
      tags: [Clinic - Queue]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: doctorId
          required: true
          schema: { type: integer }
      responses:
        200:
          description: Current queue state details

  /clinic/queue/{doctorId}/advance:
    put:
      summary: Advance the queue
      tags: [Clinic - Queue]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: doctorId
          required: true
          schema: { type: integer }
      responses:
        200:
          description: Next queue state details

  # ================= Public Booking =================
  /public/appointments/available-slots:
    get:
      summary: Get available slots (Public)
      tags: [Public Booking]
      parameters:
        - in: query
          name: doctor_id
          required: true
          schema: { type: integer }
        - in: query
          name: date
          required: true
          schema: { type: string, format: date }
        - in: query
          name: clinic_id
          required: true
          schema: { type: integer }
      responses:
        200:
          description: Available slots

  /public/appointments/book:
    post:
      summary: Book API directly from website
      tags: [Public Booking]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clinic_id: { type: integer }
                doctor_id: { type: integer }
                appointment_date: { type: string, format: date }
                start_time: { type: string }
                phone: { type: string }
                full_name: { type: string }
                notes: { type: string }
      responses:
        201:
          description: Appointment booked successfully and patient handled automatically.

  /public/doctors:
    get:
      summary: List all public doctors
      tags: [Public - Doctors]
      parameters:
        - in: query
          name: specialty
          schema: { type: string }
      responses:
        200:
          description: List of doctors

  /public/specialties:
    get:
      summary: List all distinct specialties
      tags: [Public - Doctors]
      responses:
        200:
          description: Specialties array

  /public/reviews:
    get:
      summary: List doctor reviews
      tags: [Public - Reviews]
      parameters:
        - in: query
          name: doctor_id
          required: true
          schema: { type: integer }
      responses:
        200:
          description: List of reviews
    
    post:
      summary: Submit a doctor review
      tags: [Public - Reviews]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                doctor_id: { type: integer }
                rating: { type: integer }
                reviewer_name: { type: string }
                phone: { type: string }
                comment: { type: string }
      responses:
        201:
          description: Review submitted